<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>のりすけのナッツお裾分け大作戦</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a3d05;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
  }
  #wrap {
    position: relative;
    width: 100%;
    max-width: 720px;
  }
  canvas {
    display: block;
    width: 100%;
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #dpad {
    display: grid;
    grid-template-areas: ". u ." "l . r" ". d .";
    gap: 5px;
    padding: 12px;
    width: 186px;
    margin-top: 10px;
  }
  .db {
    width:54px; height:54px;
    background:rgba(255,255,255,0.22);
    border:none; border-radius:12px;
    font-size:22px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:white;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .db:active, .db.on { background:rgba(255,255,255,0.55); }
  #bu { grid-area:u; } #bd { grid-area:d; }
  #bl { grid-area:l; } #br { grid-area:r; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
</div>
<div id="dpad">
  <button class="db" id="bu">&#x25B2;</button>
  <button class="db" id="bl">&#x25C0;</button>
  <button class="db" id="br">&#x25B6;</button>
  <button class="db" id="bd">&#x25BC;</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 720, H = 430;
canvas.width = W; canvas.height = H;

const SPEED = 185;
const TIME = 30;
const N = 10;
const R_PICKUP = 40;
const R_DELIVER = 48;
const R_PLAYER = 20;

// 5 recipient positions at screen edges
const RECIPIENT_POSITIONS = [
  { x: 88,  y: 105 },
  { x: 632, y: 105 },
  { x: 44,  y: 270 },
  { x: 676, y: 270 },
  { x: 360, y: 400 },
];

let state = 'start';
let player, trees, timeLeft, delivered, touchDest;
let hasNut = false;
let nut = null;
let recipients = [];
let keys = {};
let dpad = { x: 0, y: 0 };
let lastTs = 0;
let particles = [];

function spawnParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 100;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 40,
      life: 1,
      color: ['#f5c842','#ff8c00','#44cc44','#ffffff','#ff66cc'][Math.floor(Math.random()*5)],
      size: 5 + Math.random() * 6,
    });
  }
}

function spawnNut() {
  let nx, ny, attempts = 0;
  do {
    nx = W/2 + (Math.random() - 0.5) * 160;
    ny = H/2 + (Math.random() - 0.5) * 100;
    attempts++;
  } while (attempts < 100 && Math.hypot(nx - player.x, ny - player.y) < 50);
  nut = { x: nx, y: ny };
}

function genLevel() {
  trees = [];
  particles = [];

  recipients = RECIPIENT_POSITIONS.map(p => ({
    x: p.x, y: p.y,
    celebrating: false,
    celebTimer: 0,
  }));

  for (let i = 0; i < 14; i++) {
    const x = 110 + Math.random() * (W - 220);
    const y = 90 + Math.random() * (H - 170);
    const r = 20 + Math.random() * 12;
    if (Math.hypot(x - W/2, y - H/2) < 70) continue;
    if (recipients.some(rec => Math.hypot(rec.x - x, rec.y - y) < 90)) continue;
    trees.push({ x, y, r });
  }

  player = { x: W/2, y: H/2 };
  timeLeft = TIME;
  delivered = 0;
  hasNut = false;
  touchDest = null;
  nut = null;
  spawnNut();
}

// ---- Drawing functions (no emoji) ----

function drawBG() {
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#72c14a');
  g.addColorStop(1, '#4e9c34');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  for (let i = 0; i < 28; i++) {
    const gx = (i * 139 + 30) % W;
    const gy = 55 + (i * 97 + 20) % (H - 70);
    ctx.globalAlpha = 0.08;
    ctx.beginPath();
    ctx.ellipse(gx, gy, 22, 11, i*0.4, 0, Math.PI*2);
    ctx.fillStyle = '#2a6010';
    ctx.fill();
  }
  ctx.restore();
}

function drawTree(t) {
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(t.x - 5, t.y + t.r*0.4, 10, t.r*0.65);
  const colors = ['#2e7a18','#3a9020','#4aa82c'];
  [1.0, 0.72, 0.48].forEach((s, i) => {
    ctx.beginPath();
    ctx.arc(t.x, t.y - t.r*0.1*i, t.r*s, 0, Math.PI*2);
    ctx.fillStyle = colors[i];
    ctx.fill();
  });
}

function drawNut(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.ellipse(0, -10, 9, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#5a8030';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 11, 0, 0, Math.PI*2);
  ctx.fillStyle = '#8B4513';
  ctx.fill();
  ctx.strokeStyle = '#5c2d0a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(6, 0);
  ctx.strokeStyle = '#5c2d0a';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawNutOnGround(n) {
  const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 280);
  ctx.save();
  ctx.globalAlpha = 0.38 * pulse;
  ctx.beginPath();
  ctx.arc(n.x, n.y, 30, 0, Math.PI*2);
  ctx.fillStyle = '#ffdd00';
  ctx.fill();
  ctx.restore();
  drawNut(n.x, n.y);
}

function drawSquirrel(x, y) {
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.ellipse(x, y + 20, 14, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.strokeStyle = '#a06020';
  ctx.lineWidth = 11;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - 6, y + 8);
  ctx.quadraticCurveTo(x - 28, y - 5, x - 14, y - 22);
  ctx.stroke();
  ctx.strokeStyle = '#c8803a';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(x - 6, y + 8);
  ctx.quadraticCurveTo(x - 28, y - 5, x - 14, y - 22);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(x + 2, y + 9, 11, 14, 0, 0, Math.PI*2);
  ctx.fillStyle = '#b86018';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x + 2, y - 5, 12, 0, Math.PI*2);
  ctx.fillStyle = '#d07824';
  ctx.fill();

  ctx.fillStyle = '#d07824';
  [[-7, -15],[8, -14]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.ellipse(x + ex, y + ey, 5, 7, ex < 0 ? -0.4 : 0.4, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.fillStyle = '#f0a060';
  [[-7, -15],[8, -14]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.ellipse(x + ex, y + ey, 2.5, 4, ex < 0 ? -0.4 : 0.4, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle = '#111';
  [[-3, -7],[6, -6]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.arc(x + ex, y + ey, 2.2, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.fillStyle = '#fff';
  [[-2, -8],[7, -7]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.arc(x + ex, y + ey, 0.8, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle = '#884400';
  ctx.beginPath();
  ctx.arc(x + 1, y - 1, 1.8, 0, Math.PI*2);
  ctx.fill();

  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#ff8866';
  [-5, 8].forEach(ex => {
    ctx.beginPath();
    ctx.arc(x + ex, y + 1, 4, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();

  ctx.restore();
}

function drawRecipient(rec) {
  // Celebration glow
  if (rec.celebrating) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, rec.celebTimer / 1.5) * 0.65;
    ctx.beginPath();
    ctx.arc(rec.x, rec.y, 52, 0, Math.PI*2);
    ctx.fillStyle = '#ffff44';
    ctx.fill();
    ctx.restore();
  }

  // Nest (home) indicator above the squirrel
  ctx.beginPath();
  ctx.ellipse(rec.x, rec.y - 40, 16, 8, 0, 0, Math.PI*2);
  ctx.fillStyle = '#7a4e28';
  ctx.fill();
  // Arrow pointing down toward the squirrel
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.moveTo(rec.x - 6, rec.y - 28);
  ctx.lineTo(rec.x + 6, rec.y - 28);
  ctx.lineTo(rec.x, rec.y - 20);
  ctx.closePath();
  ctx.fill();

  // Recipient squirrel at 0.62 scale
  ctx.save();
  ctx.translate(rec.x, rec.y);
  ctx.scale(0.62, 0.62);
  ctx.translate(-rec.x, -rec.y);
  drawSquirrel(rec.x, rec.y);
  ctx.restore();
}

function drawParticles(dt) {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 150 * dt;
    p.life -= dt * 2.5;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(8, 8, W - 16, 42, 10);
  ctx.fill();

  const urgent = timeLeft <= 10;
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = urgent ? '#ff5555' : '#ffffff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('TIME: ' + Math.ceil(timeLeft), 18, 29);

  // Status: tell player what to do
  ctx.font = 'bold 17px sans-serif';
  ctx.textAlign = 'center';
  if (hasNut) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('ナッツを届けろ！', W/2, 29);
  } else {
    ctx.fillStyle = '#aaffaa';
    ctx.fillText('ナッツを拾え！', W/2, 29);
  }

  // Count
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(delivered + ' / ' + N, W - 18, 29);
}

function wrapText(text, maxWidth) {
  const lines = [];
  for (const ch of text.split('\n')) {
    const parts = ch.split('');
    let cur = '';
    for (const c of parts) {
      const test = cur + c;
      if (ctx.measureText(test).width > maxWidth && cur.length > 0) {
        lines.push(cur); cur = c;
      } else { cur = test; }
    }
    if (cur) lines.push(cur);
  }
  return lines;
}

function drawCanvasOverlay(title, lines, btnLabel) {
  ctx.fillStyle = 'rgba(10,40,5,0.88)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 30px sans-serif';
  ctx.fillStyle = '#ffe066';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(title, W/2, 40);

  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#ffffff';
  lines.forEach((line, i) => {
    ctx.fillText(line, W/2, 105 + i * 30);
  });

  const bw = 220, bh = 52, bx = W/2 - bw/2, by = H - 100;
  ctx.fillStyle = '#f5a623';
  roundRect(bx, by, bw, bh, 26);
  ctx.fill();
  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnLabel, W/2, by + bh/2);
}

function draw(dt) {
  drawBG();

  if (state === 'start') {
    drawCanvasOverlay(
      'のりすけのナッツお裾分け大作戦',
      [
        'ナッツを拾って、端っこにいるリスに届けよう！',
        '10回届けたらクリア！制限時間は 30秒 ！',
        '',
        'PC: WASD / 矢印キー',
        'スマホ: 画面タップ or 下のボタン',
      ],
      'はじめる！'
    );
    return;
  }

  if (state === 'won' || state === 'lost') {
    trees.forEach(drawTree);
    recipients.forEach(drawRecipient);
    drawSquirrel(player.x, player.y);
    const title = state === 'won' ? 'クリア！全部届けたよ！' : '時間切れ！';
    const lines = state === 'won'
      ? ['のりすけ最高！', '残り時間：' + Math.ceil(timeLeft) + '秒']
      : [delivered + '回 / ' + N + '回 届けられたよ。', 'もう一回チャレンジ！'];
    drawCanvasOverlay(title, lines, 'もう一回！');
    return;
  }

  // state === 'playing'
  trees.forEach(drawTree);

  if (touchDest) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(touchDest.x, touchDest.y, 14, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }

  // Draw recipients
  recipients.forEach(drawRecipient);

  // Draw nut on ground (if player not carrying)
  if (!hasNut && nut) {
    drawNutOnGround(nut);
  }

  drawSquirrel(player.x, player.y);

  // Draw nut above player if carrying
  if (hasNut) {
    drawNut(player.x + 8, player.y - 28);
    // Small glow
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(player.x + 8, player.y - 28, 18, 0, Math.PI*2);
    ctx.fillStyle = '#ffdd00';
    ctx.fill();
    ctx.restore();
    drawNut(player.x + 8, player.y - 28);
  }

  drawParticles(dt);
  drawHUD();
}

function update(dt) {
  if (state !== 'playing') return;

  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    endGame(false);
    return;
  }

  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A'] || dpad.x < 0) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || dpad.x > 0) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W'] || dpad.y < 0) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S'] || dpad.y > 0) dy += 1;

  if (dx !== 0 || dy !== 0) {
    touchDest = null;
    const len = Math.hypot(dx, dy);
    player.x += (dx/len) * SPEED * dt;
    player.y += (dy/len) * SPEED * dt;
  } else if (touchDest) {
    const tdx = touchDest.x - player.x;
    const tdy = touchDest.y - player.y;
    const dist = Math.hypot(tdx, tdy);
    if (dist < 6) {
      touchDest = null;
    } else {
      player.x += (tdx/dist) * SPEED * dt;
      player.y += (tdy/dist) * SPEED * dt;
    }
  }

  player.x = Math.max(R_PLAYER, Math.min(W - R_PLAYER, player.x));
  player.y = Math.max(R_PLAYER + 50, Math.min(H - R_PLAYER, player.y));

  // Pickup nut
  if (!hasNut && nut) {
    if (Math.hypot(nut.x - player.x, nut.y - player.y) < R_PICKUP) {
      hasNut = true;
      nut = null;
      touchDest = null;
    }
  }

  // Deliver to recipient
  if (hasNut) {
    for (const rec of recipients) {
      if (Math.hypot(rec.x - player.x, rec.y - player.y) < R_DELIVER) {
        hasNut = false;
        delivered++;
        rec.celebrating = true;
        rec.celebTimer = 1.5;
        spawnParticles(rec.x, rec.y);
        touchDest = null;
        if (delivered >= N) {
          endGame(true);
        } else {
          spawnNut();
        }
        break;
      }
    }
  }

  // Update celebration timers
  recipients.forEach(rec => {
    if (rec.celebrating) {
      rec.celebTimer -= dt;
      if (rec.celebTimer <= 0) {
        rec.celebrating = false;
        rec.celebTimer = 0;
      }
    }
  });
}

function endGame(won) {
  state = won ? 'won' : 'lost';
}

function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw(dt);
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function canvasToGame(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: cx * (W / rect.width),
    y: cy * (H / rect.height),
  };
}

function handleTap(cx, cy) {
  if (state === 'start' || state === 'won' || state === 'lost') {
    genLevel();
    state = 'playing';
    return;
  }
  if (state === 'playing') {
    touchDest = canvasToGame(cx, cy);
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  handleTap(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  touchDest = canvasToGame(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  handleTap(e.clientX - r.left, e.clientY - r.top);
});

// D-pad
[['bu',0,-1],['bd',0,1],['bl',-1,0],['br',1,0]].forEach(([id,x,y]) => {
  const btn = document.getElementById(id);
  const on = (e) => { e.preventDefault(); dpad.x=x; dpad.y=y; btn.classList.add('on'); };
  const off = () => { dpad={x:0,y:0}; btn.classList.remove('on'); };
  btn.addEventListener('touchstart', on, {passive:false});
  btn.addEventListener('touchend', off);
  btn.addEventListener('mousedown', on);
  btn.addEventListener('mouseup', off);
  btn.addEventListener('mouseleave', off);
});

requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
